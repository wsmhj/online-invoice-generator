<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Invoice Generator</title>
  <link rel="canonical" href="https://invoicegenerator.run/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c3e50; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button:hover { background: #1a6ea8; }
    #preview { margin-top: 24px; border: 1px solid #ccc; padding: 16px; display: none; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Online Invoice Generator</h1>
  <p>Create simple invoices quickly and for free.</p>

  <label>Your Name / Business
    <input type="text" id="from" placeholder="Your Company" />
  </label>
  <label>Client Name
    <input type="text" id="to" placeholder="Client Name" />
  </label>
  <label>Invoice Date
    <input type="date" id="date" />
  </label>
  <label>Description of Services
    <textarea id="desc" rows="3" placeholder="Web design services..."></textarea>
  </label>
  <label>Amount ($)
    <input type="number" id="amount" placeholder="500" />
  </label>
  <button onclick="generateInvoice()">Generate Invoice</button>

  <div id="preview"></div>

  <br />
  <a class="cta" href="https://invoicegenerator.run/">Online Invoice</a>

  <footer>
    <p>For the full-featured tool, visit <a href="https://invoicegenerator.run/">Online Invoice</a>.</p>
  </footer>

  <script>
    function generateInvoice() {
      const from = document.getElementById('from').value || 'Your Company';
      const to = document.getElementById('to').value || 'Client';
      const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
      const desc = document.getElementById('desc').value || 'Services rendered';
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const preview = document.getElementById('preview');
      preview.style.display = 'block';
      preview.innerHTML = '<h2>Invoice</h2><p><b>From:</b> ' + from + '</p><p><b>To:</b> ' + to + '</p><p><b>Date:</b> ' + date + '</p><p><b>Description:</b> ' + desc + '</p><p><b>Amount Due:</b> $' + amount.toFixed(2) + '</p>';
    }
  </script>
</body>
</html>
